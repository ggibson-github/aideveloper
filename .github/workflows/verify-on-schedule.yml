name: Verify on schedule

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/headless-verify.py
        continue-on-error: true
      - run: python scripts/pull-ready-work-orders.py
        continue-on-error: true
